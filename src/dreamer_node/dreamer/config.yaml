defaults:

  logdir: null
  traindir: null
  evaldir: null
  offline_traindir: ''
  offline_evaldir: ''
  seed: 0
  deterministic_run: False
  steps: 1e6
  parallel: False
  eval_every: 1e4
  eval_episode_num: 10
  log_every: 1e4
  reset_every: 0
  device: 'cuda:0'
  compile: True
  precision: 32
  debug: False
  video_pred_log: True

  # Environment
  task: 'dmc_walker_walk'
  size: [64, 64]
  envs: 1
  action_repeat: 2
  time_limit: 1000
  grayscale: False
  prefill: 2500
  reward_EMA: True

  # Model
  dyn_hidden: 512
  dyn_deter: 512
  dyn_stoch: 32
  dyn_discrete: 32
  dyn_rec_depth: 1
  dyn_mean_act: 'none'
  dyn_std_act: 'sigmoid2'
  dyn_min_std: 0.1
  grad_heads: ['decoder', 'reward', 'cont']
  units: 512
  act: 'SiLU'
  norm: True
  encoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, symlog_inputs: True}
  decoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, cnn_sigmoid: False, image_dist: mse, vector_dist: symlog_mse, outscale: 1.0}
  actor:
    {layers: 2, dist: 'normal', entropy: 3e-4, unimix_ratio: 0.01, std: 'learned', min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 1.0}
  critic:
    {layers: 2, dist: 'symlog_disc', slow_target: True, slow_target_update: 1, slow_target_fraction: 0.02, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 0.0}
  reward_head:
    {layers: 2, dist: 'symlog_disc', loss_scale: 1.0, outscale: 0.0}
  cont_head:
    {layers: 2, loss_scale: 1.0, outscale: 1.0}
  dyn_scale: 0.5
  rep_scale: 0.1
  kl_free: 1.0
  weight_decay: 0.0
  unimix_ratio: 0.01
  initial: 'learned'

  # Training
  batch_size: 16
  batch_length: 64
  train_ratio: 512
  pretrain: 100
  model_lr: 1e-4
  opt_eps: 1e-8
  grad_clip: 1000
  dataset_size: 1000000
  opt: 'adam'

  # Behavior.
  discount: 0.997
  discount_lambda: 0.95
  imag_horizon: 15
  imag_gradient: 'dynamics'
  imag_gradient_mix: 0.0
  eval_state_mean: False

  # Exploration
  expl_behavior: 'greedy'
  expl_until: 0
  expl_extr_scale: 0.0
  expl_intr_scale: 1.0
  disag_target: 'stoch'
  disag_log: True
  disag_models: 10
  disag_offset: 1
  disag_layers: 4
  disag_units: 400
  disag_action_cond: False

f1tenth:  # F1Tenth-specific overrides
  # Environment
  task: 'f1tenth_race'
  size: [1]  # Placeholder since we're using vector obs
  envs: 4
  action_repeat: 2  # Match control frequency (e.g., 20Hz = 2 repeats @ 40Hz base)
  time_limit: 500  # Shorter episodes for racing
  grayscale: False  # Irrelevant for vector obs
  prefill: 5000  # More initial exploration

  # Model Architecture
  dyn_hidden: 1024
  dyn_deter: 1024
  units: 1024
  encoder:
    mlp_keys: 'lidar'  # Match your observation key
    cnn_keys: ''       # Disable image processing
    mlp_layers: 5
    mlp_units: 2048    # For 1080D lidar input
  decoder:
    mlp_keys: 'lidar'
    cnn_keys: ''
  actor:
    dist: 'normal'     # Continuous control
    min_std: 0.05      # Tighter action noise
    max_std: 0.5
    entropy: 1e-4      # Lower entropy regularization
  critic:
    layers: 3          # Deeper value estimation

  # Training
  batch_size: 32       # Larger batches for stability
  batch_length: 48     # Shorter sequences
  imag_horizon: 25     # Longer planning horizon
  discount: 0.99       # Slightly lower discount
  model_lr: 3e-4       # Faster model learning

  # Exploration
  expl_behavior: 'plan2explore'
  expl_until: 5000     # Explore for first 5k steps
  expl_intr_scale: 0.5 # Balance intrinsic/extrinsic
  disag_units: 512     # Larger disagreement network

  # Optimization
  grad_clip: 100.0     # Tighter gradient clipping
  video_pred_log: False # No video for vector obs

  # Network Architecture
  dyn_scale: 1.0       # Stronger dynamics loss
  rep_scale: 0.5       # Increased representation loss